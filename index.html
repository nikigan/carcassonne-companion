<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Carcassonne" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>Carcassonne Companion</title>
    <script>
      // Resolve and apply the theme before first paint to avoid a white flash.
      // Mirrors src/theme.ts (THEME_STORAGE_KEY, CANVAS_COLOR, resolveTheme).
      (function () {
        try {
          var choice =
            localStorage.getItem('carcassonne-companion:theme') || 'system'
          var dark =
            choice === 'dark' ||
            (choice === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var root = document.documentElement
          root.classList.add(dark ? 'dark' : 'light')
          var canvas = dark ? '#111827' : '#f9fafb'
          root.style.backgroundColor = canvas
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', canvas)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
